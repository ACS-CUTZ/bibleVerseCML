<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Treasure Box - CML Chengalam</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Fredoka', sans-serif;
  text-align: center;
  overflow: hidden;
  color: white;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}
.header { margin-top: 10px; }
.logo { width: 90px; }
.cml-title {
  font-family: 'Poppins', sans-serif;
  font-size: 30px;
}
.main-title { font-size: 38px; }

.reset-btn {
  position: fixed;
  top: 15px;
  right: 15px;
}

.admin-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
}

.box {
  font-size: 110px;
  margin-top: 40px;
  cursor: pointer;
}

.verse-box {
  display: none;
  margin: 20px auto;
  padding: 20px;
  background: white;
  color: black;
  border-radius: 15px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>

</head>

<body>

<div class="header">
  <img src="cmlLogo.png" class="logo">
  <div class="cml-title">CML CHENGALAM</div>
  <div class="main-title">🎁 Treasure Box</div>
</div>

<button class="reset-btn" onclick="resetBox()">Reset</button> <button onclick="toggleMusic()">🎵</button> <button class="admin-btn" onclick="openLogin()">🔐</button>

<div>
  <div id="box" class="box">🎁</div>
</div>

<div id="verseBox" class="verse-box">
  <p id="verse"></p>
</div>

<!-- LOGIN -->

<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>Admin Login</h3>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ADMIN -->

<div id="adminPanel" class="modal">
  <div class="modal-content">
    <h3>Admin Panel</h3>
    <textarea id="quotesInput" style="width:100%;height:120px;"></textarea><br><br>
    <button onclick="saveQuotes()">Save</button>

```
<hr>

<input id="newUser" placeholder="New Username"><br><br>
<input id="newPass" placeholder="New Password"><br><br>
<button onclick="changePassword()">Change</button>

<br><br>
<button onclick="closeAdmin()">Close</button>
```

  </div>
</div>

<audio id="openSound" src="open.mp3"></audio> <audio id="bgMusic" src="bgmusic.mp3" loop></audio>

<script>

let verses = [];
let opened = false;

/* LOAD FROM JSON */
fetch("verses.json")
  .then(res => res.json())
  .then(data => verses = data);

/* BOX */
document.getElementById("box").onclick = () => {
  if (opened) return;
  opened = true;
  openBox();
};

function openBox() {
  document.getElementById("openSound").play();
  const random = verses[Math.floor(Math.random()*verses.length)];
  setTimeout(()=>{
    document.getElementById("verse").innerText = random;
    document.getElementById("verseBox").style.display="block";
  },500);
}

function resetBox(){
  opened=false;
  document.getElementById("verseBox").style.display="none";
}

/* LOGIN */
let ADMIN_USER = localStorage.getItem("user") || "ADMIN";
let ADMIN_PASS = localStorage.getItem("pass") || "ADMIN";

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}
function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

function login(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;

  if(u===ADMIN_USER && p===ADMIN_PASS){
    closeLogin();
    openAdmin();
  } else {
    alert("Invalid login");
  }
}

/* ADMIN */
function openAdmin(){
  document.getElementById("adminPanel").style.display="flex";
  document.getElementById("quotesInput").value = verses.join("\n");
}
function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

/* SAVE TO GITHUB */
async function saveQuotes(){
  const quotes = document.getElementById("quotesInput").value.split("\n");

  const res = await fetch("/api/saveQuotes",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"SECRET123"
    },
    body: JSON.stringify({quotes})
  });

  const data = await res.json();
  if(data.success){
    alert("Saved! Redeploying...");
  } else {
    alert("Error");
  }
}

/* PASSWORD CHANGE */
function changePassword(){
  localStorage.setItem("user", document.getElementById("newUser").value);
  localStorage.setItem("pass", document.getElementById("newPass").value);
  alert("Updated");
}

/* MUSIC */
function toggleMusic(){
  let m=document.getElementById("bgMusic");
  m.paused?m.play():m.pause();
}

</script>

</body>
</html>
